# ============================================================
#  DEPLOY WORKFLOW – Publiser nettsiden til Azure
# ============================================================
#  Denne workflowen:
#    1. Logger inn i Azure med en Service Principal
#    2. Laster opp index.html til Azure Storage
#    3. Nettsiden er live på en offentlig URL!
#
#  NYE KONSEPTER:
#    - secrets.*        → Krypterte verdier ingen kan se
#    - azure/login      → Ferdiglaget action for Azure-innlogging
#    - az CLI           → Azure kommandolinje-verktøy
# ============================================================

name: Deploy til Azure

on:
  push:
    branches:
      - main    # Deploy automatisk når kode merges til main

jobs:
  deploy:
    name: 🚀 Deploy til Azure Storage
    runs-on: ubuntu-latest

    steps:
      # Steg 1: Hent koden
      - name: 📥 Hent koden
        uses: actions/checkout@v4

      # Steg 2: Logg inn i Azure
      # "secrets.AZURE_CREDENTIALS" henter den krypterte verdien
      # vi la inn med "gh secret set" – GitHub dekrypterer den for oss
      - name: 🔐 Logg inn i Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Steg 3: Last opp filer til Azure Storage ($web container)
      # $web er en spesiell container for static websites
      - name: 📤 Last opp til Azure Storage
        run: |
          az storage blob upload-batch \
            --account-name ${{ secrets.STORAGE_ACCOUNT_NAME }} \
            --source . \
            --destination '$web' \
            --overwrite \
            --pattern '*.html'

      # Steg 4: Vis den offentlige URL-en
      - name: 🌍 Vis live URL
        run: |
          echo "==========================================="
          echo "✅ Nettsiden er live!"
          echo "🌍 URL: https://${{ secrets.STORAGE_ACCOUNT_NAME }}.z1.web.core.windows.net/"
          echo "==========================================="
